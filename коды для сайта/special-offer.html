<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="основной.css">
    <link rel="stylesheet" href="3special.css">
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
    </div>
</div>
<div class="main-container">
    <!--шапка-->
    <header class="navbar">
        <div class="logo"><!--лого лев-->
            <a href="главная.html">
                <img src="картинки/лев.png" alt="Logo" class="logo-img">
            </a>
        </div>
        <nav>
            <a href="#">О нас</a>
            <a href="special-offer.html">Специальные предложения</a>
            <a href="catalog.html">Каталог</a>
        </nav>
        <div class="icons"><!--иконки справа-->
            <!--избранное-->
            <svg id="btn-избранное" class="main-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <!--корзина-->
            <svg id="btn-корзина" class="main-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <path d="M3 6h18"></path>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <!--профиль-->
            <svg id="btn-profile" class="main-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
    </header>
<div class="content-wrapper">
    <h1 class="page-title">Специальные предложения</h1>
        
    <div class="promo-grid">
        <!-- Карточка 1 -->
        <div class="promo-card">
            <div class="badge">−30%</div>
            <div class="card-image">
                <img src="картинки/палочка.png" alt="Товар">
            </div>
            <div class="card-info">
                <h3>Волшебная палочка</h3>
                <p class="description">Бузина, сердцевина из волоса единорога.</p>
                <div class="price-block">
                    <span class="old-price">1000₽</span>
                    <span class="new-price">699₽</span>
                </div>
                <button class="buy-btn" onclick="addToCart(6)">В корзину</button>
                <span class="like-btn-card" onclick="addToLike(6)">♡</span>
            </div>
        </div>
    
        <!-- Карточка 2 -->
        <div class="promo-card">
            <div class="badge">1+1=3</div>
            <div class="card-image">
                <img src="картинки/зелье-удача.png" alt="Товар">
            </div>
            <div class="card-info">
                <h3>Зелье удачи</h3>
                <p class="description">Жидкая удача в удобном флаконе.</p>
                <div class="price-block">
                    <span class="new-price">150₽</span>
                </div>
                <button class="buy-btn" onclick="addToCart(5)">В корзину</button>
                <span class="like-btn-card" onclick="addToLike(5)">♡</span>
            </div>
        </div>
    
        <!-- Карточка 3 -->
        <div class="promo-card">
            <div class="badge hot">HOT</div>
            <div class="card-image">
                <img src="картинки/мантия.png" alt="Товар">
            </div>
            <div class="card-info">
                <h3>Мантия-невидимка</h3>
                <p class="description">Ткань мягкая, скрывает полностью.</p>
                <div class="price-block">
                    <span class="old-price">2000₽</span>
                    <span class="new-price">1599₽</span>
                </div>
                <button class="buy-btn" onclick="addToCart(4)">В корзину</button>
                <span class="like-btn-card" onclick="addToLike(4)">♡</span>
            </div>
        </div>
    </div>
</div>

</div>
<script src="shop.js"></script>
<script src="3special.js"></script>
</body>
</html>
